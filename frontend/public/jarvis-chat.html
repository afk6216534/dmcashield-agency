<!DOCTYPE html>
<html>
<head>
    <title>Talk to JARVIS - DMCAShield Agency</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; background: #0a0e27; color: #00ffaa; }
        h1 { color: #00ffaa; text-align: center; }
        .chat-box { background: #1a1f3a; padding: 20px; border-radius: 10px; margin: 20px 0; }
        #response { background: #0a0e27; padding: 15px; border-radius: 5px; white-space: pre-wrap; min-height: 200px; }
        input { width: 70%; padding: 10px; border: 1px solid #00ffaa; background: #1a1f3a; color: #00ffaa; border-radius: 5px; }
        button { padding: 10px 20px; background: #00ffaa; color: #0a0e27; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .example { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🤖 Talk to JARVIS</h1>
    <p style="text-align: center;">Type in plain English - JARVIS understands you!</p>

    <div class="chat-box">
        <input type="text" id="prompt" placeholder="Type here... (e.g., 'status', 'help', 'how is marketing doing?')" onkeypress="if(event.key==='Enter') sendToJarvis()">
        <button onclick="sendToJarvis()">Send</button>
        <div class="example">Try: "status", "departments", "help", "how is marketing doing?"</div>
    </div>

    <h3>JARVIS Response:</h3>
    <div id="response">Waiting for your message...</div>

    <script>
        async function sendToJarvis() {
            const prompt = document.getElementById('prompt').value;
            if (!prompt) return;

            document.getElementById('response').innerText = '🤖 JARVIS is thinking...';

            try {
                const response = await fetch('https://dmcashield-agency-8666.apps.hostingguru.io/api/jarvis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                document.getElementById('response').innerText = data.response || JSON.stringify(data, null, 2);
                document.getElementById('prompt').value = '';
            } catch (error) {
                document.getElementById('response').innerText = 'Error: ' + error.message + '\n\nMake sure you are connected to the internet and the backend is running.';
            }
        }
    </script>
</body>
</html>
